<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription – D&A Couture</title>
  <link rel="stylesheet" href="../style/global.css" />
  <link rel="stylesheet" href="../style/navbar.css" />
  <link rel="stylesheet" href="../style/forms.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo"><img src="../images/logo.svg" alt="Diaa-mina Chic" class="nav-logo-img"></div>
    <ul class="nav-links">
      <li><a href="../index.html">Accueil</a></li>
      <li><a href="produits.html">Produits</a></li>
      <li><a href="inscription.html" class="active">Inscription</a></li>
      <li><a href="connexion.html">Connexion</a></li>
      <li><a href="commande.html">Commande</a></li>
      <li><a href="apropos.html">À Propos</a></li>
    </ul>
    <div class="nav-icons">
      <a href="connexion.html"><i class="fas fa-user"></i></a>
      <a href="commande.html"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>

  <section class="form-section">
    <div class="form-card">
      <div class="form-logo">Dia-mina Chic</div>
      <h1 class="form-title">Créer un compte</h1>
      <p class="form-subtitle">Rejoignez notre univers de robes ✨</p>

      <div class="form-message" id="formMessage"></div>

      <form id="formInscription" onsubmit="handleInscription(event)" novalidate>

        <div class="form-group" id="g-prenom">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" placeholder="Votre prénom" autocomplete="given-name" />
          <span class="error-msg"></span>
        </div>

        <div class="form-group" id="g-nom">
          <label for="nom">Nom</label>
          <input type="text" id="nom" placeholder="Votre nom" autocomplete="family-name" />
          <span class="error-msg"></span>
        </div>

        <div class="form-group" id="g-email">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="email@exemple.com" autocomplete="email" />
          <span class="error-msg"></span>
        </div>

        <div class="form-group" id="g-tel">
          <label for="tel">Téléphone <small style="font-weight:300">(optionnel)</small></label>
          <input type="tel" id="tel" placeholder="+213 5XX XXX XXX" autocomplete="tel" />
          <span class="error-msg"></span>
        </div>

        <div class="form-group" id="g-mdp">
          <label for="mdp">Mot de passe</label>
          <div class="input-icon">
            <input type="password" id="mdp" placeholder="Minimum 8 caractères" autocomplete="new-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword('mdp', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-msg"></span>
        </div>

        <div class="form-group" id="g-confirm">
          <label for="confirm">Confirmer le mot de passe</label>
          <div class="input-icon">
            <input type="password" id="confirm" placeholder="Répétez le mot de passe" autocomplete="new-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword('confirm', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-msg"></span>
        </div>

        <button type="submit" class="form-submit">S'inscrire</button>
      </form>

      <p class="form-switch">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
    </div>
  </section>

  <script src="../javascript/data.js"></script>
  <script src="../javascript/auth.js"></script>
</body>
</html>
